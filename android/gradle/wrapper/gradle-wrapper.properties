# Pins the Gradle version Android Studio uses for this project. Gradle 8.7 is
# the ceiling the project's plugins support: Chaquopy 16 and AGP 8.5 both break
# on Gradle 9 (org.gradle.util.VersionNumber was removed there — the failure
# mode is "Unable to load class 'org.gradle.util.VersionNumber'" at sync).
# Matches the version .github/workflows/android-build.yml provisions in CI.
# When Android Studio offers to generate the wrapper scripts (gradlew,
# gradle-wrapper.jar), let it — but keep this distributionUrl.
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
