name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy, informational — not yet a merge gate)
        run: mypy src/ --ignore-missing-imports || true

      - name: Fast test suite
        env:
          RETIREMENT_SYSTEM_DISABLE_LIVE_PRICE_PROVIDERS: "1"
        run: pytest -m "not slow" -q

      - name: Slow test suite (build pipeline smoke test)
        env:
          RETIREMENT_SYSTEM_DISABLE_LIVE_PRICE_PROVIDERS: "1"
        run: pytest -m "slow" -q

      - name: Frontend JS unit tests
        run: node --test "tests/frontend/**/*.test.mjs"
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov ruff

    - name: Lint with ruff
      run: |
        ruff check src/ tests/ --select=E,F,W --ignore=E501,W503

    - name: Run tests
      run: |
        pytest tests/ --tb=short -q --cov=src --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  regression-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run regression checks
      run: |
        python tools/run_regression.py

  build:
    runs-on: windows-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        python build.py --no-backup

    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: retirement-planner-exe
        path: dist/retirement_planner/
        retention-days: 30
      if: success()

    - name: Check build output
      run: |
        if (Test-Path dist/retirement_planner/retirement_planner.exe) {
          Write-Host "✓ Build successful: retirement_planner.exe created"
          Get-Item dist/retirement_planner/retirement_planner.exe | Select-Object FullName, @{N='SizeMB';E={[math]::Round($_.Length/1MB,2)}}
        } else {
          Write-Error "✗ Build failed: retirement_planner.exe not found"
          exit 1
        }
